---
- name: Bootstrap Arch Linux homelab
  hosts: homelab
  become: true
  tasks:
    - name: Wait for pacman lock to be released
      shell: |
        for _ in $(seq 1 {{ pacman_lock_wait_retries }}); do
          if ! fuser /var/lib/pacman/db.lck >/dev/null 2>&1; then
            exit 0
          fi
          sleep {{ pacman_lock_wait_delay_seconds }}
        done
        exit 1
      args:
        executable: /bin/bash
      changed_when: false
      register: pacman_lock_wait
      failed_when: pacman_lock_wait.rc != 0

    - name: Install base packages
      pacman:
        name: "{{ base_packages }}"
        state: present

    - name: Enable and start SSH daemon
      systemd:
        name: sshd
        enabled: true
        state: started

    - name: Enable and start Tailscale daemon
      systemd:
        name: tailscaled
        enabled: true
        state: started

    - name: Enable and start Docker
      systemd:
        name: docker
        enabled: true
        state: started

    - name: Add user to docker group
      user:
        name: ozeron
        groups: docker
        append: yes

    - name: Allow SSH through UFW
      community.general.ufw:
        rule: allow
        port: 22
        proto: tcp

    - name: Allow Tailscale interface
      community.general.ufw:
        rule: allow
        interface: tailscale0
        direction: in
        from_ip: any

    - name: Set UFW default forward policy to ACCEPT
      command: ufw default allow FORWARD
      changed_when: false

    - name: Allow routed traffic from Tailscale (Docker compatibility)
      community.general.ufw:
        rule: allow
        route: yes
        interface: tailscale0
        direction: in

    - name: Enable and start UFW
      community.general.ufw:
        state: enabled
