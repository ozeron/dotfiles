---
- name: Bootstrap Arch Linux homelab
  hosts: homelab
  become: true
  tasks:
    - name: Full system upgrade
      pacman:
        update_cache: yes
        upgrade: yes

    - name: Install base packages
      pacman:
        name: "{{ base_packages }}"
        state: present

    - name: Enable and start Docker
      systemd:
        name: docker
        enabled: true
        state: started

    - name: Add user to docker group
      user:
        name: ozeron
        groups: docker
        append: yes

    - name: Enable and start UFW
      community.general.ufw:
        state: enabled

    - name: Allow SSH through UFW
      community.general.ufw:
        rule: allow
        port: 22
        proto: tcp

    - name: Allow Tailscale interface
      community.general.ufw:
        rule: allow
        interface: tailscale0
        direction: in
        from_ip: any

    - name: Set UFW default forward policy to ACCEPT
      command: ufw default allow FORWARD
      changed_when: false

    - name: Allow routed traffic from Tailscale (Docker compatibility)
      community.general.ufw:
        rule: allow
        route: yes
        interface: tailscale0
        direction: in
