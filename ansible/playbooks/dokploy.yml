---
- name: Install Dokploy
  hosts: homelab
  become: true
  tasks:
    - name: Ensure Docker is running
      systemd:
        name: docker
        state: started
        enabled: true

    - name: Check if Dokploy is already installed
      command: docker service ls --filter name=dokploy
      register: dokploy_check
      changed_when: false
      failed_when: false

    - name: Install Dokploy
      shell: curl -sSL https://dokploy.com/install.sh | sh
      when: "'dokploy' not in dokploy_check.stdout"

    - name: Restart UFW
      service:
        name: ufw
        state: restarted

    - name: Ensure UFW is enabled
      community.general.ufw:
        state: enabled

    - name: Get Tailscale IP
      command: tailscale ip -4
      register: tailscale_ip
      changed_when: false

    - name: Get Tailscale Status
      command: tailscale status
      register: tailscale_status
      changed_when: false

    - name: Show Tailscale Status
      debug:
        var: tailscale_status.stdout_lines

    - name: Ensure jq is installed
      pacman:
        name: jq
        state: present

    - name: Get System Hostname
      command: hostname -s
      register: system_hostname
      changed_when: false

    - name: Get Tailscale FQDN
      shell: tailscale status --json | jq -r .Self.DNSName
      register: tailscale_fqdn
      changed_when: false
      failed_when: false

    - name: Inspect Dokploy service
      command: docker service inspect dokploy --format '{% raw %}{{ range .Spec.EndpointSpec.Ports }}{{ .Protocol }} {{ .PublishedPort }} -> {{ .TargetPort }}{{ end }}{% endraw %}'
      register: dokploy_service_info
      changed_when: false
      failed_when: false

    - name: Show Dokploy service info
      debug:
        var: dokploy_service_info.stdout_lines

    - name: Check listening ports
      shell: ss -tulpn | grep 3000
      register: listening_ports
      changed_when: false
      failed_when: false

    - name: Show listening ports
      debug:
        var: listening_ports.stdout_lines

    - name: Show Dokploy access URL
      debug:
        msg: 
          - "Access via IP: http://{{ tailscale_ip.stdout }}:3000"
          - "Access via Name: http://{{ system_hostname.stdout }}:3000"
          - "Access via FQDN: http://{{ tailscale_fqdn.stdout | default('not-found') }}:3000"

    - name: Allow Dokploy web UI port on Tailscale
      community.general.ufw:
        rule: allow
        interface: tailscale0
        direction: in
        port: '3000'
        proto: tcp

    - name: Allow routed traffic from Tailscale (Docker compatibility)
      community.general.ufw:
        rule: allow
        route: yes
        interface: tailscale0
        direction: in

    - name: Allow Dokploy web UI port
      community.general.ufw:
        rule: allow
        port: '3000'
        proto: tcp

    - name: Configure Dokploy Trusted Origins
      shell: |
        docker service update --detach=true \
          --env-add BETTER_AUTH_TRUSTED_ORIGINS=http://localhost:3000,http://{{ tailscale_ip.stdout }}:3000,http://{{ system_hostname.stdout }}:3000,http://{{ tailscale_fqdn.stdout | default(system_hostname.stdout) | trim('.') }}:3000 \
          dokploy
      register: trusted_origins_update
      changed_when: "'update rolled back' not in trusted_origins_update.stderr"
